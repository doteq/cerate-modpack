services:
  mc:
    image: itzg/minecraft-server:latest
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "24454:24454"
    environment:
      EULA: "TRUE"
      TYPE: "NEOFORGE"
      VERSION: "1.21.1"
      MEMORY: "12288M"
      MOTD: ":)"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      TZ: "Europe/Warsaw"
      DIFFICULTY: "2"
      SPAWN_PROTECTION: "0"
      ENABLE_WHITELIST: "true"
      PACKWIZ_URL: "https://raw.githubusercontent.com/doteq/cerate-modpack/main/pack.toml"
    volumes:
      - "./server:/data"
  backups:
    image: itzg/mc-backup
    restart: unless-stopped
    environment:
      BACKUP_INTERVAL: "2h"
      RCON_HOST: mc
    volumes:
      - ./server:/data:ro
      - ./backups:/backups
